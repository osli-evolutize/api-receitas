<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Importar receitas</title>
    <link rel="icon" type="image/jpeg" href="images/chef-paulo.jpg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="form-page">
    <main class="form-shell">
      <header class="form-header">
        <a class="back-link" href="./">Voltar</a>
        <div>
          <p class="category-line">Internet</p>
          <h1>Importar receitas</h1>
        </div>
      </header>

      <form class="recipe-form" id="formImportar">
        <section class="form-section">
          <h2>Busca</h2>
          <div class="form-grid">
            <label>
              Receita
              <input name="busca" placeholder="Ex.: risoto, bolo de cenoura">
            </label>
            <label>
              Categoria para gravar
              <input name="categoria" maxlength="40" value="Receitas do MasterChef" required>
            </label>
            <label>
              Ingredientes
              <input name="ingredientes" placeholder="Ex.: frango, cogumelo">
            </label>
            <label>
              Identificacao para gravar
              <input name="origem" value="MasterChef" placeholder="Ex.: MasterChef">
            </label>
          </div>
          <p class="field-hint">A pesquisa usa receita e ingredientes. A categoria e a identificacao servem para organizar o que for importado.</p>
          <button type="submit" class="primary-button">Buscar receitas</button>
          <p id="mensagemImportacao" aria-live="polite"></p>
        </section>

        <section class="form-section">
          <h2>Resultados</h2>
          <div class="web-results" id="resultadosInternet"></div>
        </section>
      </form>
    </main>

    <script src="importar.js"></script>
  </body>
</html>
