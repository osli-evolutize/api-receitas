<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unidades</title>
    <link rel="icon" type="image/jpeg" href="images/chef-paulo.jpg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="form-page">
    <main class="form-shell narrow-shell">
      <header class="form-header">
        <a class="back-link" href="./">Voltar</a>
        <a class="back-link" href="nova.html">Nova receita</a>
        <div>
          <p class="category-line">Cadastro</p>
          <h1>Unidades</h1>
        </div>
      </header>

      <form class="recipe-form" id="formUnidade">
        <section class="form-section">
          <h2>Nova unidade</h2>
          <div class="unit-create-row">
            <label>
              Unidade
              <input name="unidade" maxlength="20" required placeholder="Ex.: colher, copo, fatia">
            </label>
            <button type="submit" class="primary-button">Salvar</button>
          </div>
          <p class="field-hint">A unidade cadastra apenas o nome da medida. O peso real fica no cadastro do ingrediente.</p>
          <p id="mensagemUnidade" aria-live="polite"></p>
        </section>

        <section class="form-section">
          <h2>Unidades cadastradas</h2>
          <div class="category-table" id="listaUnidades"></div>
        </section>
      </form>
    </main>

    <script src="unidades.js"></script>
  </body>
</html>
